<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vegvisir — Find your way.</title>
<meta name="description" content="Eine persönliche Bookmark-Sammlung. Find your way." />

<!-- Favicon: stylized Vegvisir stave -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0f1c'/%3E%3Cg fill='none' stroke='%23cdb27e' stroke-width='3' stroke-linecap='round' transform='translate(50 50)'%3E%3Cg id='s'%3E%3Cline y2='-34'/%3E%3Cline y1='-34' x2='-7' y2='-44'/%3E%3Cline y1='-34' x2='7' y2='-44'/%3E%3Cline x1='-7' y1='-18' x2='7' y2='-18'/%3E%3C/g%3E%3Cuse href='%23s' transform='rotate(45)'/%3E%3Cuse href='%23s' transform='rotate(90)'/%3E%3Cuse href='%23s' transform='rotate(135)'/%3E%3Cuse href='%23s' transform='rotate(180)'/%3E%3Cuse href='%23s' transform='rotate(225)'/%3E%3Cuse href='%23s' transform='rotate(270)'/%3E%3Cuse href='%23s' transform='rotate(315)'/%3E%3C/g%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ============ THEME TOKENS ============ */
  :root {
    --ink-950: #060a14;
    --ink-900: #0a0f1c;
    --ink-850: #0d1424;
    --ink-800: #111a2e;

    --steel-100: #e6edf6;
    --steel-300: #aebaccb3;
    --steel-400: #8493a9;
    --steel-500: #5c6a82;
    --steel-line: rgba(150, 170, 205, 0.12);

    --gold: #cdb27e;
    --gold-dim: #9d875e;
    --teal: #6fd6cf;
    --teal-dim: #3f8f8c;

    --glass: rgba(146, 168, 210, 0.045);
    --glass-hi: rgba(160, 185, 230, 0.08);
    --glass-border: rgba(160, 185, 230, 0.12);

    --radius: 16px;
    --radius-sm: 12px;
    --shadow: 0 18px 50px -22px rgba(0, 0, 0, 0.8);

    --maxw: 1240px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, sans-serif;
    color: var(--steel-100);
    background: var(--ink-950);
    line-height: 1.5;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* Aurora / night-sky backdrop */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(1100px 620px at 78% -8%, rgba(70, 132, 130, 0.16), transparent 60%),
      radial-gradient(900px 560px at 12% 4%, rgba(54, 78, 140, 0.20), transparent 58%),
      radial-gradient(1200px 900px at 50% 120%, rgba(20, 32, 60, 0.55), transparent 70%),
      linear-gradient(180deg, var(--ink-900), var(--ink-950) 60%);
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.5;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(220, 235, 255, 0.5), transparent),
      radial-gradient(1px 1px at 65% 18%, rgba(220, 235, 255, 0.35), transparent),
      radial-gradient(1px 1px at 82% 56%, rgba(220, 235, 255, 0.30), transparent),
      radial-gradient(1px 1px at 38% 72%, rgba(220, 235, 255, 0.28), transparent),
      radial-gradient(1px 1px at 50% 44%, rgba(220, 235, 255, 0.22), transparent);
  }

  .wrap {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: clamp(28px, 6vw, 72px) clamp(18px, 4vw, 40px) 96px;
  }

  /* ============ HOME GRID ============ */
  .home-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(16px, 3.2vw, 30px) clamp(8px, 2vw, 16px);
    max-width: 760px;
    margin: 0 auto;
  }
  @media (min-width: 560px) { .home-grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 860px) { .home-grid { grid-template-columns: repeat(6, 1fr); max-width: 880px; } }

  /* ---- iOS-style folder tile ---- */
  .folder-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    background: none;
    border: 0;
    padding: 2px;
    font: inherit;
    color: inherit;
    cursor: pointer;
    border-radius: 18px;
  }
  .folder-tile:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; }

  .folder-preview {
    position: relative;
    width: 100%;
    max-width: 76px;
    margin-inline: auto;
    aspect-ratio: 1 / 1;
    border-radius: 26%;
    padding: 13%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8%;
    background: linear-gradient(160deg, rgba(170,190,225,0.16), rgba(146,168,210,0.05));
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 22px -14px rgba(0,0,0,0.85);
    backdrop-filter: blur(8px) saturate(120%);
    -webkit-backdrop-filter: blur(8px) saturate(120%);
    transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
    will-change: transform;
  }
  .folder-preview::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(110% 70% at 50% -10%, rgba(255,255,255,0.14), transparent 60%);
    pointer-events: none;
  }
  .folder-tile:hover .folder-preview {
    transform: translateY(-3px) scale(1.06);
    border-color: rgba(205,178,126,0.4);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 16px 30px -14px rgba(0,0,0,0.9), 0 0 22px -6px rgba(205,178,126,0.35);
  }
  .folder-tile:active .folder-preview { transform: translateY(-1px) scale(1.02); }

  /* mini app icons inside the folder preview */
  .mini {
    position: relative;
    overflow: hidden;
    border-radius: 26%;
    background: linear-gradient(160deg, rgba(160,185,230,0.16), rgba(146,168,210,0.06));
    box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.12);
  }
  .mini .mini-mono {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: "Cinzel", serif; font-weight: 700;
    font-size: 0.64rem; color: var(--gold);
    z-index: 0;
  }
  .mini img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
  .mini.empty { background: rgba(160,185,230,0.06); box-shadow: none; }

  .folder-label {
    font-size: clamp(0.74rem, 2vw, 0.84rem);
    font-weight: 600;
    letter-spacing: 0.02em;
    line-height: 1.25;
    color: rgba(221, 229, 242, 0.92);
    text-align: center;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    width: 100%;
    /* Immer max. 2 Zeilen, Rest mit … – Höhe für 2 Zeilen reserviert,
       damit lange Namen das Raster nie verschieben. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    overflow-wrap: anywhere;
    min-height: calc(2 * 1.25em);
  }
  .folder-tile:hover .folder-label { color: var(--steel-100); }

  /* ============ EMPTY STATE ============ */
  .empty-home {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: clamp(40px, 10vw, 90px) 16px;
    text-align: center;
    color: var(--steel-400);
  }
  .empty-home .eh-ico { width: 54px; height: 54px; color: var(--steel-500); }
  .empty-home p { max-width: 34ch; font-size: 0.95rem; line-height: 1.65; }
  .btn-import {
    display: inline-flex; align-items: center; gap: 9px;
    font: inherit; font-weight: 600; letter-spacing: 0.04em;
    color: var(--ink-900);
    background: linear-gradient(180deg, #f3ead4, var(--gold));
    border: 0; padding: 12px 22px; border-radius: 12px; cursor: pointer;
    box-shadow: 0 12px 34px -14px rgba(205,178,126,0.7);
    transition: filter .2s var(--ease), transform .2s var(--ease);
  }
  .btn-import:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn-import i { width: 18px; height: 18px; }

  /* ============ BOTTOM SHEET ============ */
  .sheet-backdrop {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(4, 7, 14, 0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    opacity: 0; visibility: hidden;
    transition: opacity 0.32s var(--ease), visibility 0s linear 0.32s;
  }
  .sheet-backdrop.open { opacity: 1; visibility: visible; transition: opacity 0.32s var(--ease); }

  .sheet {
    position: fixed; left: 50%; bottom: 0; z-index: 50;
    width: min(720px, 100%);
    max-height: 86dvh;
    transform: translate(-50%, 130%);
    display: flex; flex-direction: column;
    background: linear-gradient(180deg, rgba(20,28,48,0.92), rgba(10,15,28,0.96));
    backdrop-filter: blur(22px) saturate(130%); -webkit-backdrop-filter: blur(22px) saturate(130%);
    border: 1px solid var(--glass-border); border-bottom: 0;
    border-radius: 26px 26px 0 0;
    box-shadow: 0 -24px 60px -20px rgba(0,0,0,0.8);
    transition: transform 0.42s var(--ease);
  }
  .sheet.open { transform: translate(-50%, 0); }
  .sheet.dragging { transition: none; }
  @media (min-width: 720px) {
    .sheet { bottom: clamp(12px, 4vh, 40px); border-radius: 26px; border-bottom: 1px solid var(--glass-border); }
  }

  .sheet-handle {
    flex: none; width: 44px; height: 5px; border-radius: 999px;
    background: var(--steel-500); opacity: 0.6; margin: 12px auto 4px; cursor: grab;
    touch-action: none;
  }
  .sheet.dragging .sheet-handle { cursor: grabbing; }

  .sheet-head {
    flex: none; display: flex; align-items: center; gap: 14px;
    padding: 8px clamp(18px, 4vw, 28px) 6px;
  }
  .sheet-ico {
    flex: none; display: grid; place-items: center;
    width: 40px; height: 40px; border-radius: 12px;
    color: var(--teal);
    background: radial-gradient(120% 120% at 30% 20%, rgba(111,214,207,0.18), rgba(111,214,207,0.05));
    border: 1px solid rgba(111,214,207,0.2);
  }
  .sheet-ico svg, .sheet-ico i { width: 20px; height: 20px; }
  .sheet-title {
    font-family: "Cinzel", serif; font-weight: 600;
    font-size: clamp(1.2rem, 4vw, 1.5rem); letter-spacing: 0.05em;
    color: var(--steel-100); line-height: 1.1;
  }
  .sheet-sub {
    font-size: 0.74rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--steel-500); font-weight: 600;
  }
  .sheet-close {
    margin-left: auto; flex: none; display: grid; place-items: center;
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--glass-border); background: rgba(160,185,230,0.06);
    color: var(--steel-400); cursor: pointer;
    transition: color 0.25s var(--ease), background 0.25s var(--ease), border-color 0.25s var(--ease);
  }
  .sheet-close:hover { color: var(--steel-100); background: rgba(160,185,230,0.12); border-color: rgba(160,185,230,0.3); }
  .sheet-close svg, .sheet-close i { width: 17px; height: 17px; }

  .sheet-scroll {
    flex: 1 1 auto; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }

  /* App-icon grid inside sheets */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: clamp(14px, 3.2vw, 24px) clamp(6px, 1.6vw, 12px);
    padding: 10px clamp(14px, 4vw, 28px) clamp(22px, 4vw, 32px);
  }
  @media (min-width: 560px) { .grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 860px) { .grid { grid-template-columns: repeat(6, 1fr); } }

  /* ============ APP TILES ============ */
  .tile {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    text-decoration: none; color: inherit; padding: 2px; border-radius: 14px;
  }
  .tile:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; }

  .tile-ico {
    position: relative;
    width: 100%; max-width: 76px; margin-inline: auto;
    aspect-ratio: 1 / 1;
    border-radius: 24%;
    overflow: hidden;
    background: linear-gradient(160deg, rgba(160,185,230,0.12), rgba(146,168,210,0.04));
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 20px -14px rgba(0,0,0,0.8);
    transition: transform 0.28s var(--ease), box-shadow 0.28s var(--ease), border-color 0.28s var(--ease);
    will-change: transform;
  }
  .tile-ico::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    background: radial-gradient(110% 70% at 50% -10%, rgba(255,255,255,0.12), transparent 60%);
    opacity: 0.8; pointer-events: none; z-index: 2;
  }
  /* Placeholder monogram (no image) */
  .tile-ico .mono {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: "Cinzel", serif; font-weight: 600;
    font-size: clamp(1.05rem, 4.2vw, 1.55rem);
    color: var(--gold);
    z-index: 0;
  }
  /* Sobald ein Bild vorhanden ist, den Buchstaben-Platzhalter ausblenden
     (damit er bei transparenten Icons nicht durchscheint). */
  .tile-ico:has(.tile-img) .mono { display: none; }
  .mini:has(img) .mini-mono { display: none; }

  /* Image from the Toride export */
  .tile-ico .tile-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  .tile:hover .tile-ico {
    transform: translateY(-3px) scale(1.07);
    border-color: rgba(205,178,126,0.4);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      0 16px 30px -14px rgba(0,0,0,0.85),
      0 0 22px -4px rgba(205,178,126,0.35);
  }
  .tile:active .tile-ico { transform: translateY(-1px) scale(1.02); }

  .tile-name {
    font-size: clamp(0.72rem, 2vw, 0.82rem);
    font-weight: 600; letter-spacing: 0.01em;
    color: var(--steel-300); text-align: center; line-height: 1.25;
    width: 100%;
    /* Immer max. 2 Zeilen, Rest mit … – Höhe für 2 Zeilen reserviert,
       damit lange Namen das Raster nie verschieben. */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    overflow-wrap: anywhere;
    min-height: calc(2 * 1.25em);
    transition: color 0.28s var(--ease);
  }
  .tile:hover .tile-name { color: var(--steel-100); }

  /* File-drop hint overlay */
  body.dropping::after { background: rgba(111,214,207,0.06); }
  .drop-veil {
    position: fixed; inset: 0; z-index: 60; display: none;
    place-items: center; pointer-events: none;
    background: rgba(4,7,14,0.6); backdrop-filter: blur(4px);
    color: var(--teal); font-family: "Cinzel", serif; letter-spacing: 0.1em; font-size: 1.2rem;
  }
  body.dropping .drop-veil { display: grid; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <input id="importFile" type="file" accept=".json,application/json" hidden />

  <div class="wrap">
    <main class="home" id="home">
      <div class="home-grid" id="homeGrid"></div>
    </main>
  </div>

  <div class="sheet-backdrop" id="backdrop"></div>
  <div id="sheets"></div>
  <div class="drop-veil">JSON hier ablegen</div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    /* ============ DATA (imported Toride JSON, persisted locally) ============ */
    const STORE_KEY = "vegvisir.data";

    function loadData() {
      try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : null; }
      catch { return null; }
    }
    function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

    /* ---- Helpers ---- */
    function esc(s) {
      return String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }
    function escAttr(s) { return esc(s).replace(/'/g, "&#39;"); }

    function hostOf(u) {
      try { return new URL(u).hostname.replace(/^www\./, ""); } catch { return String(u || ""); }
    }
    function hrefOf(u) { return /^[a-z][a-z0-9+.-]*:\/\//i.test(u) ? u : "https://" + u; }

    function initial(s) {
      s = String(s || "").trim();
      const m = s.match(/[\p{L}\p{N}]/u);
      return (m ? m[0] : (s[0] || "?")).toUpperCase();
    }

    function isImg(u) { return typeof u === "string" && u.trim() !== ""; }

    /* ---- Tile (single bookmark) ---- */
    function tileHTML(bm) {
      const name = bm.name || hostOf(bm.url);
      const img = isImg(bm.imageUrl)
        ? `<img class="tile-img" src="${escAttr(bm.imageUrl)}" alt="" loading="lazy" onerror="this.remove()" />`
        : "";
      return `
        <a class="tile" href="${escAttr(hrefOf(bm.url))}" target="_blank" rel="noopener noreferrer"
           title="${escAttr(name)}">
          <span class="tile-ico">
            <span class="mono">${esc(initial(name))}</span>
            ${img}
          </span>
          <span class="tile-name">${esc(name)}</span>
        </a>`;
    }

    /* ---- Mini icon inside a folder preview ---- */
    function miniHTML(bm) {
      if (!bm) return `<span class="mini empty"></span>`;
      const name = bm.name || hostOf(bm.url);
      const img = isImg(bm.imageUrl)
        ? `<img src="${escAttr(bm.imageUrl)}" alt="" loading="lazy" onerror="this.remove()" />`
        : "";
      return `<span class="mini"><span class="mini-mono">${esc(initial(name))}</span>${img}</span>`;
    }

    /* ---- Folder tile (home grid) ---- */
    function folderTileHTML(f, i) {
      const links = f.bookmarks || [];
      const minis = [0, 1, 2, 3].map((n) => miniHTML(links[n])).join("");
      return `
        <button class="folder-tile" aria-haspopup="dialog" aria-controls="sheet-${i}" data-sheet="${i}">
          <span class="folder-preview">${minis}</span>
          <span class="folder-label">${esc(f.name || "Ordner")}</span>
        </button>`;
    }

    function folderIcon(icon) {
      // Toride folder icons are Lucide kebab names; legacy "pi-*" → fall back.
      if (!icon || /^pi[-\s]/.test(icon)) return "folder";
      return String(icon).replace(/[^a-z0-9-]/gi, "") || "folder";
    }

    /* ---- Bottom sheet per folder ---- */
    function sheetHTML(f, i) {
      const links = f.bookmarks || [];
      const cards = links.map(tileHTML).join("");
      const n = links.length;
      return `
        <section class="sheet" id="sheet-${i}" role="dialog" aria-modal="true" aria-label="${escAttr(f.name || "Ordner")}">
          <div class="sheet-handle" data-handle></div>
          <header class="sheet-head">
            <span class="sheet-ico"><i data-lucide="${folderIcon(f.icon)}"></i></span>
            <span><span class="sheet-title">${esc(f.name || "Ordner")}</span></span>
            <span class="sheet-sub" style="margin-left:6px">${n} ${n === 1 ? "link" : "links"}</span>
            <button class="sheet-close" aria-label="Schließen"><i data-lucide="x"></i></button>
          </header>
          <div class="sheet-scroll"><div class="grid">${cards}</div></div>
        </section>`;
    }

    /* ============ RENDER ============ */
    const homeGrid = document.getElementById("homeGrid");
    const sheetsRoot = document.getElementById("sheets");
    const backdrop = document.getElementById("backdrop");

    function render() {
      const data = loadData();
      const folders = (data && data.folders) || [];
      const roots = (data && data.bookmarks) || [];

      if (folders.length === 0 && roots.length === 0) {
        sheetsRoot.innerHTML = "";
        homeGrid.innerHTML = `
          <div class="empty-home">
            <i data-lucide="compass" class="eh-ico"></i>
            <p>Noch keine Bookmarks. Importiere deinen <strong>Toride-Export</strong> (JSON),
               dann erscheinen hier deine Ordner und Links.</p>
            <button class="btn-import" id="emptyImport"><i data-lucide="upload"></i> JSON importieren</button>
          </div>`;
        if (window.lucide) lucide.createIcons();
        document.getElementById("emptyImport").addEventListener("click", pickFile);
        return;
      }

      homeGrid.innerHTML = folders.map(folderTileHTML).join("") + roots.map(tileHTML).join("");
      sheetsRoot.innerHTML = folders.map(sheetHTML).join("");

      homeGrid.querySelectorAll(".folder-tile").forEach((btn) => {
        const sheet = document.getElementById("sheet-" + btn.dataset.sheet);
        btn.addEventListener("click", () => openSheet(sheet));
      });
      sheetsRoot.querySelectorAll(".sheet").forEach((sheet) => {
        sheet.querySelector(".sheet-close").addEventListener("click", closeSheet);
        attachDrag(sheet);
      });

      if (window.lucide) lucide.createIcons();
    }

    /* ============ OPEN / CLOSE SHEET ============ */
    let activeSheet = null;
    function openSheet(sheet) {
      if (!sheet) return;
      if (activeSheet && activeSheet !== sheet) { activeSheet.classList.remove("open"); activeSheet.style.transform = ""; }
      activeSheet = sheet;
      backdrop.classList.add("open");
      requestAnimationFrame(() => {
        sheet.classList.add("open");
        sheet.style.transform = "translate(-50%, 0)";
      });
      document.body.style.overflow = "hidden";
    }
    function closeSheet() {
      if (!activeSheet) return;
      activeSheet.classList.remove("open");
      activeSheet.style.transform = "";
      backdrop.classList.remove("open");
      activeSheet = null;
      document.body.style.overflow = "";
    }
    backdrop.addEventListener("click", closeSheet);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSheet(); });

    /* ---- Drag-to-dismiss ---- */
    function attachDrag(sheet) {
      const handle = sheet.querySelector("[data-handle]");
      let startY = 0, dy = 0, dragging = false;
      handle.addEventListener("pointerdown", (e) => {
        dragging = true; startY = e.clientY; dy = 0;
        sheet.classList.add("dragging");
        handle.setPointerCapture(e.pointerId);
      });
      handle.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        dy = Math.max(0, e.clientY - startY);
        sheet.style.transform = `translate(-50%, ${dy}px)`;
      });
      const end = () => {
        if (!dragging) return;
        dragging = false;
        sheet.classList.remove("dragging");
        if (dy > 110) closeSheet();
        else sheet.style.transform = "translate(-50%, 0)";
      };
      handle.addEventListener("pointerup", end);
      handle.addEventListener("pointercancel", end);
    }

    /* ============ IMPORT (Toride JSON) ============ */
    /* Import ist nur auf der leeren Seite möglich. Für Änderungen muss der
       localStorage geleert werden. */
    const importFile = document.getElementById("importFile");
    function pickFile() { importFile.click(); }

    function isEmptyData() {
      const d = loadData();
      const folders = (d && d.folders) || [];
      const roots = (d && d.bookmarks) || [];
      return folders.length === 0 && roots.length === 0;
    }

    function ingestJson(text) {
      let data;
      try { data = JSON.parse(text); } catch { return false; }
      if (!data || typeof data !== "object") return false;
      const folders = Array.isArray(data.folders) ? data.folders : [];
      const bookmarks = Array.isArray(data.bookmarks) ? data.bookmarks : [];
      if (folders.length === 0 && bookmarks.length === 0) return false;
      saveData({ version: 1, importedAt: new Date().toISOString(), folders, bookmarks });
      closeSheet();
      render();
      return true;
    }

    importFile.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { if (!ingestJson(String(reader.result))) alert("Keine gültige Toride-JSON-Datei."); };
      reader.readAsText(file);
      e.target.value = "";
    });

    /* ---- Drag a .json file anywhere onto the page (nur wenn leer) ---- */
    let dragDepth = 0;
    window.addEventListener("dragenter", (e) => {
      if (!isEmptyData()) return;
      if (e.dataTransfer && [...e.dataTransfer.items].some((i) => i.kind === "file")) {
        e.preventDefault(); dragDepth++; document.body.classList.add("dropping");
      }
    });
    window.addEventListener("dragover", (e) => { if (document.body.classList.contains("dropping")) e.preventDefault(); });
    window.addEventListener("dragleave", () => { if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove("dropping"); } });
    window.addEventListener("drop", (e) => {
      dragDepth = 0; document.body.classList.remove("dropping");
      if (!isEmptyData()) return;
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!file) return;
      e.preventDefault();
      const reader = new FileReader();
      reader.onload = () => { if (!ingestJson(String(reader.result))) alert("Keine gültige Toride-JSON-Datei."); };
      reader.readAsText(file);
    });

    /* ============ INIT ============ */
    render();
    if (window.lucide) lucide.createIcons();

    /* Alte Service-Worker + Caches einer früheren PWA-Version entfernen. */
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister())).catch(() => {});
    }
    if (window.caches) {
      caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
    }
  </script>
</body>
</html>
