<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Vegvisir — Find your way.</title>
<meta name="description" content="Eine persönliche Bookmark-Sammlung. Find your way." />
<meta name="theme-color" content="#060a14" />

<!-- PWA: installierbar ohne Service Worker (nur Manifest + Icons) -->
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Vegvisir" />
<link rel="apple-touch-icon" href="./assets/icon-192.png" />

<!-- Favicon -->
<link rel="icon" href="./assets/favicon.png" />

<link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <input id="importFile" type="file" accept=".json,application/json" hidden />

  <div class="wrap">
    <main class="home" id="home">
      <div class="home-grid" id="homeGrid"></div>
    </main>
  </div>

  <div class="sheet-backdrop" id="backdrop"></div>
  <div id="sheets"></div>
  <div class="drop-veil">JSON hier ablegen</div>

  <!-- Feste Suchleiste unten -->
  <div class="searchbar hidden" id="searchbar">
    <i data-lucide="search" class="search-ico"></i>
    <input id="searchInput" type="search" placeholder="Suchen…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button class="search-clear" id="searchClear" aria-label="Suche beenden"><i data-lucide="x"></i></button>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
